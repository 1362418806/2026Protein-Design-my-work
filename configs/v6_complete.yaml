seed: 42
team_name: YourTeamName
paths:
  reference_sequences_file: AAseqs of 5 GFP proteins.txt
  exclusion_list_file: Exclusion_List.csv
  gfp_data_file: GFP_data.xlsx
features:
  mode: simple
  esm_model: esm2_t30_150M_UR50D
  batch_size: 16
training:
  max_train_samples: 20000
  low_brightness_quantile: 0.2
candidate_generation:
  n_candidates: 20000
selection:
  min_len: 220
  max_len: 250
  low_brightness_risk_max: 0.35
  max_mutation_count: 9
v5:
  final_k: 6
  structure_top_n: 200
  lambda_std: 0.75
  require_real_structure_for_final: true
  basic_gate:
    max_protected_mutations: 0
    max_pocket_mutations: 0
    max_ion_network_mutations: 0
    max_low_brightness_risk: 0.35
    max_mutation_count: 9
    max_chromophore_mutations: 0
    max_core_mutations: 1
  structure_gate:
    max_barrel_rmsd: 1.5
    max_pocket_rmsd: 0.85
    max_ion_network_rmsd: 0.75
    min_structure_geometry_score: 0.45
    min_proteinmpnn_score_norm: 0.2
structure:
  enabled: true
  top_n: 200
  reference_pdb: null
  predicted_pdb_dir: null
  structure_metrics_csv: null
proteinmpnn:
  enabled: true
  score_csv: null
  score_column: proteinmpnn_score
  lower_is_better: true
  export_top_n: 200
af_branch:
  enabled: true
  backend: colabfold
  export_top_n: 200
traceability:
  enabled: true
  write_stage_manifests: true
  write_input_hashes: true
  lineage_csv: v6_lineage.csv
  stage_status_csv: v6_stage_status.csv
  run_manifest_json: v6_run_manifest.json
  artifact_index_csv: v6_artifact_index.csv
v6:
  feedback:
    enabled: true
    previous_ranked_csv: null
    feedback_csv: null
    feedback_candidate_fraction: 0.55
    max_seed_rows: 160
    fallback_good_rows: 80
    max_success_low_risk: 0.35
    min_success_pmpnn_norm: 0.35
    whitelist_position_log_odds: 0.35
    blacklist_position_log_odds: -0.65
    whitelist_mutation_log_odds: 0.25
    blacklist_mutation_log_odds: -0.65
  structure_portfolio:
    min_pairwise_hamming: 1
    max_shared_mutations_per_pair: 5
    max_shared_mutations_per_site: 25
    quotas:
      feedback_guided_exploitation: 60
      brightness_lcb_exploitation: 50
      surface_charge_exploration: 35
      structure_verified_safe: 30
      pmpnn_compatible: 15
      diversity_reserve: 10
  final_portfolio:
    min_pairwise_hamming: 2
    max_shared_mutations_per_pair: 3
    max_shared_mutations_per_site: 2
    max_per_source_branch: 2
    mechanism_quotas:
      feedback_guided_exploitation: 1
      brightness_lcb_exploitation: 1
      surface_charge_exploration: 1
      structure_verified_safe: 1
      pmpnn_compatible: 1
      diversity_reserve: 1
  attribution_report: true
